<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CHANNTASY_CUP // SCOREBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e0a;--panel:#0f140f;--amber:#ffb000;--amber2:#ffd479;--green:#39ff14;--dim:#5a6b52;--line:#1c241b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"JetBrains Mono",monospace;color:var(--amber);background:var(--bg);
  background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.35) 0 1px,transparent 1px 3px)}
.hero{max-width:940px;margin:0 auto;padding:48px 20px 30px}
.crt{border:2px solid var(--line);border-radius:10px;background:var(--panel);padding:28px 26px;
  box-shadow:inset 0 0 60px rgba(255,176,0,.06)}
.eyebrow{color:var(--dim);font-size:12px;letter-spacing:.2em}
.eyebrow .blink{color:var(--green);animation:bl 1.1s steps(1) infinite}
@keyframes bl{50%{opacity:0}}
h1{font-family:"DotGothic16";font-size:clamp(34px,8vw,76px);line-height:1;margin:10px 0 4px;color:var(--amber2);
  text-shadow:0 0 10px rgba(255,176,0,.6)}
.hero-sub{color:var(--dim);font-size:13px;letter-spacing:.05em}
.cc-prize{margin-top:22px;display:inline-flex;align-items:baseline;gap:14px;border:1px dashed var(--line);padding:12px 20px;border-radius:6px}
.cc-prize-amt{font-family:"DotGothic16";font-size:clamp(30px,7vw,46px);color:var(--green);line-height:1;text-shadow:0 0 12px rgba(57,255,20,.5)}
.cc-prize-lbl{color:var(--dim);font-size:11px;letter-spacing:.1em;text-transform:uppercase}
main{max-width:940px;margin:0 auto;padding:6px 20px 60px}
.cc-meta{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 18px}
.cc-chip{border:1px solid var(--line);border-radius:4px;padding:6px 12px;font-size:12px;color:var(--dim)}
.cc-chip b{color:var(--amber)}
.cc-chip-champ b{color:var(--green)}
.colhead,.cc-row{display:grid;grid-template-columns:46px 34px 1fr auto 72px;align-items:center;gap:12px}
.colhead{padding:8px 14px;color:var(--dim);font-size:11px;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--line)}
.colhead .r{text-align:right}
.cc-board{list-style:none;border:1px solid var(--line);border-top:0;border-radius:0 0 8px 8px;overflow:hidden}
.cc-row{padding:13px 14px;border-bottom:1px solid var(--line);background:repeating-linear-gradient(90deg,transparent 0 2px,rgba(255,176,0,.015) 2px 4px)}
.cc-row:last-child{border-bottom:0}
.cc-row[data-top="1"]{background:rgba(255,176,0,.07)}
.cc-rank{font-family:"DotGothic16";font-size:22px;text-align:center}
.cc-flag{font-size:20px;text-align:center;filter:grayscale(.15)}
.cc-name{font-weight:800;font-size:17px;letter-spacing:.02em;display:block;color:var(--amber2)}
.cc-champ{font-size:11px;color:var(--dim);letter-spacing:.03em}
.cc-bd{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.cc-badge{font-size:11px;font-weight:700;padding:2px 7px;border:1px solid var(--line);border-radius:3px;color:var(--dim)}
.cc-badge i{font-style:normal;opacity:.7;margin-right:3px}
.cc-badge[data-on="true"]{color:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(57,255,20,.25)}
.cc-total{font-family:"DotGothic16";font-size:26px;text-align:right;color:var(--green);text-shadow:0 0 10px rgba(57,255,20,.4)}
.waiting{margin-top:28px}
.waiting h2{color:var(--dim);font-size:12px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:12px}
.waiting h2::before{content:"> "}
.cc-waiting{display:flex;flex-wrap:wrap;gap:8px}
.cc-wait{font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:4px;padding:5px 11px}
.cc-wait::before{content:"[ ] "}
.foot{max-width:940px;margin:0 auto;padding:18px 20px 60px;color:var(--dim);font-size:11px;letter-spacing:.06em}
@media(max-width:620px){.colhead{display:none}.cc-row{grid-template-columns:36px 1fr 64px;grid-template-areas:"r n t" "r b b";gap:8px}.cc-rank{grid-area:r}.cc-flag{display:none}.cc-id{grid-area:n}.cc-bd{grid-area:b;justify-content:flex-start;margin-top:8px}.cc-total{grid-area:t}}
</style>
</head>
<body>
<header class="hero"><div class="crt">
  <p class="eyebrow">SYS://CHANNTASY_CUP/KNOCKOUT_26 <span class="blink">█</span></p>
  <h1>CHANNTASY CUP</h1>
  <p class="hero-sub">// live standings — refresh to recompute from match results</p>
  <div class="cc-prize" id="cc-prize"></div>
</div></header>
<main>
  <div class="cc-meta" id="cc-meta"></div>
  <div class="colhead"><span>POS</span><span>★</span><span>PLAYER</span><span class="r">ROUND_PTS</span><span class="r">TOT</span></div>
  <ol class="cc-board" id="cc-board"></ol>
  <section class="waiting"><h2>awaiting_input</h2><div class="cc-waiting" id="cc-waiting"></div></section>
</main>
<footer class="foot">// independent fan pool — no affiliation with any governing body</footer>
<script src="preview.js"></script>
</body>
</html>
