<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Channtasy Cup — Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#fafafa;--ink:#111;--red:#e8330a;--line:#e2e2e2;--dim:#8a8a8a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;color:var(--ink);background:var(--paper);line-height:1.4}
.wrap{max-width:920px;margin:0 auto;padding:0 28px}
.hero{padding:80px 0 44px;border-bottom:1px solid var(--ink)}
.grid-top{display:grid;grid-template-columns:1fr auto;align-items:end;gap:24px}
.eyebrow{font-family:"Space Grotesk";font-size:12px;letter-spacing:.06em;color:var(--dim);text-transform:uppercase}
h1{font-family:"Space Grotesk";font-weight:700;font-size:clamp(40px,8vw,82px);line-height:.98;letter-spacing:-.03em;margin:14px 0 0}
h1 .slash{color:var(--red)}
.cc-prize{text-align:right}
.cc-prize-amt{font-family:"Space Grotesk";font-weight:700;font-size:clamp(34px,6vw,56px);line-height:.9;letter-spacing:-.02em}
.cc-prize-lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.cc-meta{display:flex;gap:28px;flex-wrap:wrap;padding:18px 0;border-bottom:1px solid var(--line);font-size:13px;color:var(--dim)}
.cc-chip b{color:var(--ink);font-family:"Space Grotesk";font-weight:700}
.cc-chip-champ{color:var(--red)}
.colhead{display:grid;grid-template-columns:42px 1fr auto 70px;gap:16px;padding:14px 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);border-bottom:1px solid var(--ink)}
.colhead .r{text-align:right}
.cc-board{list-style:none}
.cc-row{display:grid;grid-template-columns:42px 1fr auto 70px;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.cc-row[data-top="1"]{background:linear-gradient(90deg,rgba(232,51,10,.06),transparent 40%)}
.cc-rank{font-family:"Space Grotesk";font-weight:700;font-size:20px;color:var(--dim)}
.cc-row[data-top="1"] .cc-rank{color:var(--red)}
.cc-flag{display:none}
.cc-name{font-family:"Space Grotesk";font-weight:500;font-size:19px;letter-spacing:-.01em;display:block}
.cc-champ{font-size:12px;color:var(--dim)}
.cc-bd{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.cc-badge{font-family:"Space Grotesk";font-size:11px;font-weight:500;padding:2px 7px;border:1px solid var(--line);color:var(--dim);border-radius:2px}
.cc-badge i{font-style:normal;opacity:.55;margin-right:4px}
.cc-badge[data-on="true"]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.cc-total{font-family:"Space Grotesk";font-weight:700;font-size:24px;text-align:right;letter-spacing:-.02em}
.waiting{margin-top:48px}
.waiting h2{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--dim);border-bottom:1px solid var(--ink);padding-bottom:8px;margin-bottom:14px}
.cc-waiting{display:flex;flex-wrap:wrap;gap:8px 10px}
.cc-wait{font-size:13px;color:var(--dim);border:1px solid var(--line);border-radius:2px;padding:5px 11px}
.foot{padding:30px 0 70px;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
@media(max-width:640px){.grid-top{grid-template-columns:1fr}.cc-prize{text-align:left}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div class="grid-top">
      <div><p class="eyebrow">Knockout Pool — Index 2026</p>
      <h1>Channtasy<span class="slash">/</span>Cup</h1></div>
      <div class="cc-prize" id="cc-prize"></div>
    </div>
  </header>
  <div class="cc-meta" id="cc-meta"></div>
  <div class="colhead"><span>#</span><span>Participant</span><span class="r">Round points</span><span class="r">Total</span></div>
  <ol class="cc-board" id="cc-board"></ol>
  <section class="waiting"><h2>Pending entries</h2><div class="cc-waiting" id="cc-waiting"></div></section>
  <footer class="foot">Independent — not affiliated with FIFA or the FIFA World Cup 26™</footer>
</div>
<script src="preview.js"></script>
</body>
</html>
