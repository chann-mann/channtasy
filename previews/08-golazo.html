<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Channtasy Cup — ¡Gooool!</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--pink:#ff2e88;--orange:#ff7a1a;--lime:#b6f500;--cyan:#12d0c4;--purple:#7b2ff7;--ink:#1a1030;--paper:#fff6fb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Rubik,sans-serif;color:var(--ink);background:var(--paper)}
.hero{position:relative;text-align:center;padding:58px 22px 70px;color:#fff;overflow:hidden;
  background:linear-gradient(120deg,var(--purple),var(--pink) 45%,var(--orange))}
.papel{position:absolute;inset:0 0 auto;top:0;height:26px;
  background:repeating-linear-gradient(90deg,var(--lime) 0 30px,var(--cyan) 30px 60px,var(--orange) 60px 90px,var(--pink) 90px 120px);
  -webkit-mask:repeating-linear-gradient(90deg,#000 0 22px,transparent 22px 30px);mask:repeating-linear-gradient(90deg,#000 0 22px,transparent 22px 30px)}
.hero-inner{position:relative;z-index:2;max-width:900px;margin:0 auto}
.eyebrow{font-weight:900;letter-spacing:.28em;text-transform:uppercase;font-size:12px;color:var(--lime)}
h1{font-family:"Rubik Mono One";font-size:clamp(38px,9vw,86px);line-height:1;margin:12px 0 6px;text-shadow:4px 4px 0 rgba(0,0,0,.25)}
.hero-sub{font-weight:700;font-size:16px;opacity:.95}
.cc-prize{margin-top:26px;display:inline-flex;flex-direction:column;align-items:center;background:var(--lime);color:var(--ink);padding:14px 30px;border-radius:18px;transform:rotate(-1.5deg);box-shadow:5px 5px 0 rgba(0,0,0,.3)}
.cc-prize-amt{font-family:"Rubik Mono One";font-size:clamp(30px,7vw,50px);line-height:1}
.cc-prize-lbl{font-weight:900;text-transform:uppercase;letter-spacing:.1em;font-size:10px}
main{max-width:900px;margin:0 auto;padding:26px 16px 60px}
.cc-meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.cc-chip{background:#fff;border:3px solid var(--ink);border-radius:999px;padding:7px 16px;font-size:13px;font-weight:700;box-shadow:3px 3px 0 var(--ink)}
.cc-chip-champ{background:var(--cyan);color:var(--ink)}
.cc-board{list-style:none}
.cc-row{display:grid;grid-template-columns:52px 44px 1fr auto 72px;align-items:center;gap:13px;background:#fff;border:3px solid var(--ink);border-radius:16px;padding:14px 18px;margin-bottom:12px;box-shadow:5px 5px 0 var(--ink)}
.cc-row[data-top="1"]{background:var(--lime)}.cc-row[data-top="2"]{background:var(--cyan)}.cc-row[data-top="3"]{background:var(--orange);color:#fff}
.cc-rank{font-family:"Rubik Mono One";font-size:24px;text-align:center}
.cc-flag{font-size:28px;text-align:center}
.cc-name{font-weight:900;font-size:20px;display:block;line-height:1;text-transform:uppercase}
.cc-champ{font-size:11px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.04em}
.cc-bd{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.cc-badge{font-size:11px;font-weight:900;padding:4px 8px;border-radius:8px;border:2.5px solid var(--ink);background:#fff}
.cc-badge i{font-style:normal;opacity:.5;margin-right:3px}
.cc-badge[data-on="true"]{background:var(--pink);color:#fff;border-color:var(--ink)}
.cc-total{font-family:"Rubik Mono One";font-size:28px;text-align:right;color:var(--pink)}
.cc-row[data-top="3"] .cc-total{color:#fff}
.waiting{margin-top:32px}
.waiting h2{font-family:"Rubik Mono One";font-size:18px;color:var(--purple);margin-bottom:12px}
.cc-waiting{display:flex;flex-wrap:wrap;gap:8px}
.cc-wait{font-weight:700;font-size:13px;border:3px dashed var(--purple);color:var(--purple);border-radius:999px;padding:5px 14px}
.foot{max-width:900px;margin:0 auto;padding:22px 16px 60px;text-align:center;color:#a98fb5;font-size:11px;font-weight:500}
@media(max-width:620px){.cc-row{grid-template-columns:42px 1fr 64px;grid-template-areas:"r n t" "r b b";gap:8px}.cc-rank{grid-area:r}.cc-flag{display:none}.cc-id{grid-area:n}.cc-bd{grid-area:b;justify-content:flex-start;margin-top:8px}.cc-total{grid-area:t}}
</style>
</head>
<body>
<header class="hero"><span class="papel"></span><div class="hero-inner">
  <p class="eyebrow">¡Vamos! · La Copa de los Amigos</p>
  <h1>Channtasy Cup</h1>
  <p class="hero-sub">Pick bold, score big, talk louder — ¡goooool!</p>
  <div class="cc-prize" id="cc-prize"></div>
</div></header>
<main>
  <div class="cc-meta" id="cc-meta"></div>
  <ol class="cc-board" id="cc-board"></ol>
  <section class="waiting"><h2>Aún sin bracket</h2><div class="cc-waiting" id="cc-waiting"></div></section>
</main>
<footer class="foot">Una quiniela entre amigos · independent fan pool, no affiliation with any organiser.</footer>
<script src="preview.js"></script>
</body>
</html>
