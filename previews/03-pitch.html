<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Channtasy Cup — Matchday Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Oswald:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--g1:#1f8a4c;--g2:#1a7a43;--line:rgba(255,255,255,.55);--ink:#0c1f14;--paper:#f3f7f3;--chalk:#fff;--gold:#ffd34d}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;color:var(--ink);background:var(--paper)}
.hero{position:relative;color:#fff;padding:56px 22px 70px;
  background:repeating-linear-gradient(90deg,var(--g1) 0 64px,var(--g2) 64px 128px)}
.hero::before{content:"";position:absolute;inset:18px;border:3px solid var(--line);border-radius:6px;pointer-events:none}
.hero::after{content:"";position:absolute;left:50%;top:18px;bottom:18px;width:3px;background:var(--line);transform:translateX(-50%)}
.circle{position:absolute;left:50%;top:50%;width:180px;height:180px;border:3px solid var(--line);border-radius:50%;transform:translate(-50%,-50%)}
.hero-inner{position:relative;z-index:2;max-width:900px;margin:0 auto;text-align:center}
.eyebrow{font-family:"Rajdhani";font-weight:700;letter-spacing:.4em;text-transform:uppercase;font-size:13px}
h1{font-family:"Oswald";font-weight:700;text-transform:uppercase;font-size:clamp(46px,11vw,104px);line-height:.95;letter-spacing:.01em;text-shadow:0 3px 0 rgba(0,0,0,.25)}
.hero-sub{font-family:"Rajdhani";font-weight:600;font-size:16px;opacity:.95}
.cc-prize{margin-top:26px;display:inline-flex;align-items:baseline;gap:12px;background:#06160d;border:2px solid var(--line);border-radius:10px;padding:12px 22px;font-family:"Rajdhani"}
.cc-prize-amt{font-weight:700;font-size:clamp(32px,7vw,48px);color:var(--gold);line-height:1}
.cc-prize-lbl{font-weight:600;text-transform:uppercase;letter-spacing:.12em;font-size:11px;opacity:.8}
main{max-width:900px;margin:0 auto;padding:26px 16px 60px}
.cc-meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:22px}
.cc-chip{font-family:"Rajdhani";font-weight:700;background:#fff;border:2px solid var(--g1);color:var(--g1);border-radius:8px;padding:7px 14px;font-size:13px;text-transform:uppercase;letter-spacing:.04em}
.cc-chip-champ{background:var(--g1);color:#fff}
.cc-board{list-style:none;background:#06160d;border-radius:14px;padding:8px;border:2px solid #06160d}
.cc-row{display:grid;grid-template-columns:50px 42px 1fr auto 70px;align-items:center;gap:12px;color:#dff3e6;padding:13px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.cc-row:last-child{border-bottom:0}
.cc-row[data-top]{background:rgba(255,255,255,.04)}
.cc-row[data-top="1"]{box-shadow:inset 4px 0 0 var(--gold)}
.cc-rank{font-family:"Oswald";font-size:26px;text-align:center;color:#9fd7b3}
.cc-flag{font-size:24px;text-align:center}
.cc-name{font-family:"Rajdhani";font-weight:700;font-size:20px;display:block;line-height:1;color:#fff}
.cc-champ{font-size:11px;opacity:.55;text-transform:uppercase;letter-spacing:.05em;font-family:"Rajdhani"}
.cc-bd{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
.cc-badge{font-family:"Rajdhani";font-weight:700;font-size:12px;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,.08);color:#bfe6cd}
.cc-badge i{font-style:normal;opacity:.5;margin-right:4px}
.cc-badge[data-on="true"]{background:var(--g1);color:#fff}
.cc-total{font-family:"Oswald";font-size:30px;text-align:right;color:var(--gold)}
.waiting{margin-top:30px}
.waiting h2{font-family:"Oswald";text-transform:uppercase;font-size:18px;color:var(--g1);margin-bottom:12px}
.cc-waiting{display:flex;flex-wrap:wrap;gap:8px}
.cc-wait{font-family:"Rajdhani";font-weight:600;font-size:13px;border:2px dashed var(--g1);color:var(--g1);border-radius:8px;padding:5px 13px;text-transform:uppercase}
.foot{max-width:900px;margin:0 auto;padding:22px 16px 60px;text-align:center;color:#5e7a68;font-size:11px}
@media(max-width:620px){.cc-row{grid-template-columns:38px 1fr 62px;grid-template-areas:"r n t" "r b b";gap:8px}.cc-rank{grid-area:r}.cc-flag{display:none}.cc-id{grid-area:n}.cc-bd{grid-area:b;justify-content:flex-start;margin-top:8px}.cc-total{grid-area:t}}
</style>
</head>
<body>
<header class="hero"><span class="circle"></span><div class="hero-inner">
  <p class="eyebrow">Knockout Stage · Live Table</p>
  <h1>Channtasy Cup</h1>
  <p class="hero-sub">Pick the winners. Climb the table. Lift the cup.</p>
  <div class="cc-prize" id="cc-prize"></div>
</div></header>
<main>
  <div class="cc-meta" id="cc-meta"></div>
  <ol class="cc-board" id="cc-board"></ol>
  <section class="waiting"><h2>On the bench</h2><div class="cc-waiting" id="cc-waiting"></div></section>
</main>
<footer class="foot">Friendly fan pool · independent of any governing body.</footer>
<script src="preview.js"></script>
</body>
</html>
