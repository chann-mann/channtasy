<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Channtasy Cup — Under the Floodlights</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070b1a;--bg2:#0d1430;--cyan:#22e6ff;--pink:#ff3da6;--violet:#7a5cff;--ink:#dfe7ff;--dim:#7e8bbf}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Chakra Petch",sans-serif;color:var(--ink);background:var(--bg);
  background-image:radial-gradient(1100px 500px at 50% -10%,rgba(122,92,255,.35),transparent 60%),linear-gradient(180deg,var(--bg2),var(--bg))}
.hero{position:relative;text-align:center;padding:66px 22px 64px;overflow:hidden}
.beam{position:absolute;top:-60px;width:2px;height:340px;background:linear-gradient(180deg,rgba(34,230,255,.0),rgba(34,230,255,.5),transparent);transform-origin:top}
.beam.l{left:18%;transform:rotate(18deg)}.beam.r{right:18%;transform:rotate(-18deg)}
.hero-inner{position:relative;z-index:2;max-width:900px;margin:0 auto}
.eyebrow{font-family:"Orbitron";font-weight:600;letter-spacing:.42em;text-transform:uppercase;font-size:12px;color:var(--cyan)}
h1{font-family:"Orbitron";font-weight:800;font-size:clamp(40px,9vw,92px);line-height:1;text-transform:uppercase;letter-spacing:.02em;margin:12px 0 6px;
  color:#fff;text-shadow:0 0 14px rgba(34,230,255,.7),0 0 40px rgba(255,61,166,.5)}
.hero-sub{color:var(--dim);font-weight:600;font-size:15px;letter-spacing:.04em}
.cc-prize{margin-top:28px;display:inline-flex;flex-direction:column;align-items:center;padding:14px 30px;border-radius:14px;
  border:1px solid rgba(34,230,255,.5);background:rgba(34,230,255,.06);box-shadow:0 0 24px rgba(34,230,255,.25),inset 0 0 24px rgba(122,92,255,.15)}
.cc-prize-amt{font-family:"Orbitron";font-weight:800;font-size:clamp(32px,7vw,52px);line-height:1;color:#fff;text-shadow:0 0 16px var(--cyan)}
.cc-prize-lbl{text-transform:uppercase;letter-spacing:.16em;font-size:10px;color:var(--cyan)}
main{max-width:900px;margin:0 auto;padding:24px 16px 64px}
.cc-meta{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.cc-chip{border:1px solid rgba(122,92,255,.5);background:rgba(122,92,255,.08);border-radius:999px;padding:7px 15px;font-size:13px;font-weight:600}
.cc-chip b{color:var(--cyan)}
.cc-chip-champ{border-color:var(--pink);background:rgba(255,61,166,.12)}
.cc-board{list-style:none}
.cc-row{display:grid;grid-template-columns:50px 44px 1fr auto 76px;align-items:center;gap:14px;
  background:rgba(255,255,255,.03);border:1px solid rgba(122,92,255,.22);border-radius:14px;padding:14px 18px;margin-bottom:11px;transition:.2s}
.cc-row:hover{border-color:rgba(34,230,255,.5);box-shadow:0 0 20px rgba(34,230,255,.15)}
.cc-row[data-top="1"]{border-color:var(--cyan);box-shadow:0 0 26px rgba(34,230,255,.3)}
.cc-row[data-top="2"]{border-color:var(--violet)}.cc-row[data-top="3"]{border-color:var(--pink)}
.cc-rank{font-family:"Orbitron";font-weight:800;font-size:24px;text-align:center;color:var(--cyan)}
.cc-flag{font-size:26px;text-align:center}
.cc-name{font-weight:700;font-size:19px;display:block;line-height:1;color:#fff}
.cc-champ{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.cc-bd{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.cc-badge{font-size:11px;font-weight:700;padding:4px 8px;border-radius:7px;background:rgba(255,255,255,.05);color:var(--dim);border:1px solid rgba(255,255,255,.08)}
.cc-badge i{font-style:normal;opacity:.6;margin-right:4px}
.cc-badge[data-on="true"]{background:rgba(34,230,255,.16);color:#fff;border-color:var(--cyan);box-shadow:0 0 10px rgba(34,230,255,.3)}
.cc-total{font-family:"Orbitron";font-weight:800;font-size:28px;text-align:right;color:#fff;text-shadow:0 0 12px rgba(255,61,166,.6)}
.waiting{margin-top:32px}
.waiting h2{font-family:"Orbitron";text-transform:uppercase;font-size:15px;letter-spacing:.12em;color:var(--violet);margin-bottom:12px}
.cc-waiting{display:flex;flex-wrap:wrap;gap:8px}
.cc-wait{font-size:13px;font-weight:600;border:1px dashed rgba(122,92,255,.5);color:var(--dim);border-radius:999px;padding:6px 14px}
.foot{max-width:900px;margin:0 auto;padding:22px 16px 60px;text-align:center;color:#566089;font-size:11px}
@media(max-width:620px){.cc-row{grid-template-columns:40px 1fr 64px;grid-template-areas:"r n t" "r b b";gap:8px}.cc-rank{grid-area:r}.cc-flag{display:none}.cc-id{grid-area:n}.cc-bd{grid-area:b;justify-content:flex-start;margin-top:8px}.cc-total{grid-area:t}}
</style>
</head>
<body>
<header class="hero"><span class="beam l"></span><span class="beam r"></span><div class="hero-inner">
  <p class="eyebrow">Kickoff · Night Session</p>
  <h1>Channtasy Cup</h1>
  <p class="hero-sub">The knockout pool, lit up under the lights</p>
  <div class="cc-prize" id="cc-prize"></div>
</div></header>
<main>
  <div class="cc-meta" id="cc-meta"></div>
  <ol class="cc-board" id="cc-board"></ol>
  <section class="waiting"><h2>Warming up</h2><div class="cc-waiting" id="cc-waiting"></div></section>
</main>
<footer class="foot">Independent fan pool. Not affiliated with any tournament organiser.</footer>
<script src="preview.js"></script>
</body>
</html>
